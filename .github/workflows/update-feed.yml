  name: Update                                                                                                                                                                    
                                                                                                                                                                                  
  on:                                                                                                                                                                             
    workflow_dispatch:                                                                                                                                                            
    push:                                                                                                                                                                         
      branches:                                                                                                                                                                   
        - main                                                                                                                                                                    
    schedule:                                                                                                                                                                     
      # Run shortly after the daily arXiv release window, plus a backup run                                                                                                       
      # in case GitHub Actions drops or delays a scheduled trigger.                                                                                                               
      - cron: "30 18 * * *"                                                                                                                                                       
      - cron: "30 1 * * *"                                                                                                                                                        
                                                                                                                                                                                  
  concurrency:                                                                                                                                                                    
    group: update-feed                                                                                                                                                            
    cancel-in-progress: false                                                                                                                                                     
                                                                                                                                                                                  
  jobs:                                                                                                                                                                           
    build:                                                                                                                                                                        
      runs-on: ubuntu-latest                                                                                                                                                      
                                                                                                                                                                                  
      steps:                                                                                                                                                                      
        - uses: actions/checkout@v2                                                                                                                                               
                                                                                                                                                                                  
        - name: Download ArxivFeed                                                                                                                                                
          env:                                                                                                                                                                    
            REPO: "NotCraft/ArxivFeed"                                                                                                                                            
            VERSION: "latest"                                                                                                                                                     
            RENAME: "arxivfeed.tgz"                                                                                                                                               
          shell: bash                                                                                                                                                             
          run: |                                                                                                                                                                  
            curl -sL --fail \                                                                                                                                                     
              "https://api.github.com/repos/${REPO}/releases/${VERSION}" \                                                                                                        
              | jq -r '.assets[] | select(.name | test("^arxivfeed-v.*-x86_64-unknown-linux-musl\\.tar\\.gz$")) | .browser_download_url' \                                        
              | tee asset.url                                                                                                                                                     
                                                                                                                                                                                  
            test -s asset.url                                                                                                                                                     
                                                                                                                                                                                  
            curl -sL --fail \                                                                                                                                                     
              -o "${RENAME}" \                                                                                                                                                    
              "$(cat asset.url)"                                                                                                                                                  
                                                                                                                                                                                  
            tar -zxvf "${RENAME}" --strip-components 1 $(tar tf "${RENAME}" | grep '/arxivfeed$')                                                                                 
            chmod +x arxivfeed                                                                                                                                                    
                                                                                                                                                                                  
        - name: Build rss                                                                                                                                                         
          run: ./arxivfeed                                                                                                                                                        
                                                                                                                                                                                  
        - name: Deploy to GitHub Pages                                                                                                                                            
          uses: peaceiris/actions-gh-pages@v3                                                                                                                                     
          with:                                                                                                                                                                   
            github_token: ${{ secrets.GITHUB_TOKEN }}                                                                                                                             
            publish_dir: ./target                                                                                                                                                 
            force_orphan: true          
